  <title>StudyLink — 발견</title>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fff;--surface:#fafafa;--border:#ebebeb;--text:#1a1a1a;--muted:#999;--accent:#1a1a1a;--tag-bg:#f4f4f4;--hover:#f7f7f7;--blue:#3b6ef5;--green:#2d9b6f;--orange:#e07b3a;--purple:#7c5cbf;--pink:#d45c8a;--teal:#2a9bb5}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
    nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;gap:16px}
    .logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);text-decoration:none;flex-shrink:0}
    .logo span{color:var(--blue)}
    .nav-center{display:flex;align-items:center;gap:20px}
    .nav-link{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .15s;white-space:nowrap}
    .nav-link:hover,.nav-link.active{color:var(--text)}
    .nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .lang-bar{display:flex;gap:2px;margin-right:8px}
    .lang-btn{background:none;border:1px solid transparent;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--muted);padding:4px 8px;cursor:pointer;transition:all .15s}
    .lang-btn:hover{color:var(--text);border-color:var(--border)}
    .lang-btn.active{color:var(--text);border-color:var(--accent);background:var(--tag-bg)}
    .btn-ghost{background:none;border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--text);padding:6px 14px;cursor:pointer;transition:background .15s}
    .btn-ghost:hover{background:var(--hover)}
    .btn-solid{background:var(--accent);border:none;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#fff;padding:6px 14px;cursor:pointer;transition:opacity .15s}
    .btn-solid:hover{opacity:.82}
    .hero{padding:52px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
    .hero-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
    .hero h1{font-size:34px;font-weight:600;line-height:1.2;margin-bottom:8px}
    .zh .hero h1{font-family:'Noto Serif SC',serif}
    .kr .hero h1{font-family:'Noto Serif KR',serif}
    .en .hero h1{font-family:'Playfair Display',serif}
    .hero-sub{font-size:12px;color:var(--muted);margin-bottom:28px}
    .search-bar{display:flex;align-items:center;max-width:540px;margin:0 auto;border:1px solid var(--border);border-bottom:2px solid var(--accent)}
    .search-bar input{flex:1;border:none;outline:none;font-family:'DM Mono',monospace;font-size:13px;padding:13px 16px;background:transparent;color:var(--text)}
    .search-bar input::placeholder{color:#ccc}
    .search-bar button{background:var(--accent);border:none;color:#fff;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;padding:13px 18px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
    .search-bar button:hover{opacity:.82}
    .search-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:14px}
    .search-tag{font-size:10px;letter-spacing:0.08em;color:var(--muted);border:1px solid var(--border);padding:4px 12px;cursor:pointer;transition:all .15s;text-decoration:none}
    .search-tag:hover{color:var(--text);border-color:var(--text)}
    .main{display:flex;max-width:1180px;margin:0 auto;padding:36px 32px;gap:32px}
    .content{flex:1;min-width:0}
    .sidebar{width:272px;flex-shrink:0}
    .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .sec-title{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text)}
    .sec-more{font-size:10px;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:1px;transition:color .15s}
    .sec-more:hover{color:var(--text)}
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:44px}
    .cat-card{border:1px solid var(--border);padding:18px 14px;cursor:pointer;transition:border-color .15s,background .15s;text-decoration:none;display:block}
    .cat-card:hover{border-color:var(--accent);background:var(--hover)}
    .cat-icon{font-size:20px;margin-bottom:8px}
    .cat-name{font-size:12px;letter-spacing:0.06em;color:var(--text);margin-bottom:3px}
    .cat-desc{font-size:10px;color:var(--muted);line-height:1.5}
    .cat-count{font-size:10px;color:var(--muted);margin-top:8px;border-top:1px solid var(--border);padding-top:7px}
    .tabs{display:flex;margin-bottom:20px;border-bottom:1px solid var(--border)}
    .tab{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:9px 18px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
    .tab.active{color:var(--text);border-bottom-color:var(--accent)}
    .tab:hover{color:var(--text)}
    .post-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
    .post-card{background:var(--bg);padding:18px 0;display:flex;gap:14px;cursor:pointer;transition:all .12s}
    .post-card:hover{background:var(--hover);padding-left:6px}
    .post-left{flex:1;min-width:0}
    .post-meta{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
    .post-cat{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:2px 7px;border:1px solid currentColor}
    .cat-blue{color:var(--blue)}.cat-green{color:var(--green)}.cat-orange{color:var(--orange)}.cat-purple{color:var(--purple)}.cat-pink{color:var(--pink)}.cat-teal{color:var(--teal)}
    .post-author{font-size:10px;color:var(--muted)}.post-time{font-size:10px;color:#ccc}
    .post-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:5px;color:var(--text)}
    .post-excerpt{font-size:11px;color:var(--muted);line-height:1.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .post-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
    .post-tag{font-size:9px;color:var(--muted);background:var(--tag-bg);padding:2px 7px;letter-spacing:0.04em}
    .post-footer{display:flex;align-items:center;gap:14px;margin-top:8px}.post-stat{font-size:10px;color:#bbb}
    .post-right{width:76px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:flex-end}
    .post-score{text-align:center}.score-num{font-size:22px;font-weight:300;color:var(--text);line-height:1}.score-stars{color:#f5a623;font-size:10px;margin-top:2px}.score-label{font-size:9px;color:var(--muted);letter-spacing:0.08em;margin-top:2px}
    .sidebar-section{margin-bottom:32px}
    .sidebar-title{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--border)}
    .user-list{display:flex;flex-direction:column}
    .user-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}.user-item:last-child{border-bottom:none}
    .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
    .user-info{flex:1;min-width:0}.user-name{font-size:12px;color:var(--text);margin-bottom:2px}.user-tag{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .tag-cloud{display:flex;flex-wrap:wrap;gap:7px}.cloud-tag{font-size:10px;color:var(--muted);border:1px solid var(--border);padding:4px 11px;cursor:pointer;transition:all .15s;text-decoration:none}.cloud-tag:hover{color:var(--text);border-color:var(--text)}
    .notice-list{border:1px solid var(--border)}.notice-item{padding:11px 13px;border-bottom:1px solid var(--border);font-size:11px;line-height:1.5;color:var(--muted);cursor:pointer;transition:background .12s}.notice-item:last-child{border-bottom:none}.notice-item:hover{background:var(--hover);color:var(--text)}.notice-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--blue);margin-right:7px;vertical-align:middle}

    .footer-logo{font-family:'Playfair Display',serif;font-size:16px;color:var(--text)}.footer-logo span{color:var(--blue)}.footer-links{display:flex;gap:18px}.footer-link{font-size:10px;letter-spacing:0.08em;color:var(--muted);text-decoration:none}.footer-link:hover{color:var(--text)}.footer-copy{font-size:10px;color:#ccc}
    @media(max-width:900px){.sidebar{display:none}.cat-grid{grid-template-columns:repeat(2,1fr)}nav .nav-center{display:none}}

</head>

function renderPosts(filter='all'){const t=T[lang];const posts=[{cat:'review',catLabel:'리뷰 · 대학',catColor:'cat-blue',author:'@kim_m',time:'2시간',title:'서울대학교 실제 정보와 솔직한 평가',excerpt:'입학부터 졸업까지 모든 것에 대한 선배의 이야기...',tags:['서울대','대학평가','입시'],stats:'👍 342  💬 87  🔖 156',score:'9.2',stars:'★★★★★',scoreLabel:'평가'},{cat:'admission',catLabel:'입시자료',catColor:'cat-green',author:'@study_kr',time:'5시간',title:'2025 수능 고난도 문제 풀이법 정리',excerpt:'지난 5년의 기출을 분석하여 만든 풀이 전략...',tags:['수능','수학','기출'],stats:'👍 518  💬 43  🔖 892',score:'📄',stars:'',scoreLabel:'무료'},{cat:'study',catLabel:'학습',catColor:'cat-purple',author:'@time_mgr',time:'어제',title:'하루 8시간 집중 공부 유지법',excerpt:'뽀모도로와 파인만 기법을 결합한 시간 관리...',tags:['시간관리','효율','공부법'],stats:'👍 721  💬 134  🔖 440',score:'',stars:'',scoreLabel:''},{cat:'abroad',catLabel:'유학',catColor:'cat-teal',author:'@abroad_kr',time:'2일전',title:'고려대학교 입학 완벽 가이드',excerpt:'지원 과정부터 면접까지 모든 정보를 담았습니다...',tags:['고려대','유학','가이드'],stats:'👍 634  💬 201  🔖 377',score:'8.8',stars:'★★★★☆',scoreLabel:'추천'},{cat:'review',catLabel:'리뷰 · 학식',catColor:'cat-orange',author:'@food_guru',time:'3일전',title:'대학교 학식 식당 모두 먹고 평가했습니다',excerpt:'15개 식당을 모두 직접 방문하여 먹어본 솔직한 평가...',tags:['학식','대학','음식'],stats:'👍 1.2k  💬 389  🔖 521',score:'7.6',stars:'★★★★☆',scoreLabel:'평가'},{cat:'study',catLabel:'광장',catColor:'cat-pink',author:'@lost_soul',time:'4일전',title:'대학교 2학년인데 진로가 막혀있어요',excerpt:'전공도 맞지 않는데 뭘 해야 할지 모르겠습니다...',tags:['고민','진로','조언'],stats:'👍 892  💬 476  🔖 88',score:'',stars:'',scoreLabel:''}];const filtered=filter==='all'?posts:posts.filter(p=>p.cat===filter);document.getElementById('postList').innerHTML=filtered.map(p=>`<div class="post-card"><div class="post-left"><div class="post-meta"><span class="post-cat ${p.catColor}">${p.catLabel}</span><span class="post-author">${p.author}</span><span class="post-time">${p.time}</span></div><div class="post-title">${p.title}</div><div class="post-excerpt">${p.excerpt}</div><div class="post-tags">${p.tags.map(tg=>`<span class="post-tag">${tg}</span>`).join('')}</div><div class="post-footer"><span class="post-stat">${p.stats}</span></div></div><div class="post-right">${p.score?`<div class="post-score"><div class="score-num">${p.score}</div><div class="score-stars">${p.stars}</div><div class="score-label">${p.scoreLabel}</div></div>`:''}</div></div>`).join('')}
function switchTab(el,cat){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderPosts(cat)}
function renderUsers(){const t=T[lang];const users=[{initials:'김',bg:'#3b6ef5',name:'김민지',tag:'고3 · 서울대 목표'},{initials:'L',bg:'#2d9b6f',name:'李晓雨',tag:'중국 유학생 · 한국어'},{initials:'박',bg:'#7c5cbf',name:'박서준',tag:'고려대 · 멘토'},{initials:'陈',bg:'#e07b3a',name:'陈语桐',tag:'연세대 · 언어전문'}];document.getElementById('userList').innerHTML=users.map((u,i)=>`<div class="user-item"><div class="avatar" style="background:${u.bg}">${u.initials}</div><div class="user-info"><div class="user-name">${u.name}</div><div class="user-tag">${u.tag}</div></div><button class="follow-btn${i===3?' following':''}" onclick="toggleFollow(this)">${i===3?'팔로잉':'팔로우'}</button></div>`).join('')}
function renderTags(){document.getElementById('tagCloud').innerHTML=T[lang].tags.map(tg=>`<a class="cloud-tag" href="#">${tg}</a>`).join('')}
function renderNotices(){document.getElementById('noticeList').innerHTML=T[lang].notices.map(n=>`<div class="notice-item"><span class="notice-dot"></span>${n}</div>`).join('')}
function toggleFollow(btn){if(btn.classList.contains('following')){btn.classList.remove('following');btn.textContent=T[lang].side_friends==='추천 공부 친구'?'팔로우':'Follow'}else{btn.classList.add('following');btn.textContent=T[lang].side_friends==='추천 공부 친구'?'팔로잉':'Following'}}
function doSearch(){const q=document.getElementById('searchInput').value.trim();if(q)alert({zh:'搜索：',kr:'검색：',en:'Search: '}[lang]+q)}
async function logout(){await sb.auth.signOut();window.location.href='index.html'}
document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.lang-btn')[1].classList.add('active');applyText();renderAll();checkAuth()});
async function checkAuth(){const {data:{user}}=await sb.auth.getUser();if(!user)window.location.href='index.html'}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
</script>
