<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Serif+KR:wght@400;600&family=DM+Mono:wght@300;400&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#fff;--surface:#fafafa;--border:#ebebeb;
      --text:#1a1a1a;--muted:#999;--accent:#1a1a1a;
      --tag-bg:#f4f4f4;--hover:#f7f7f7;
      --blue:#3b6ef5;--green:#2d9b6f;--orange:#e07b3a;
      --purple:#7c5cbf;--pink:#d45c8a;--teal:#2a9bb5;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}

    /* NAV */
    nav{
      position:sticky;top:0;z-index:100;
      background:rgba(255,255,255,0.94);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 32px;height:56px;gap:16px;
    }
    .logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);text-decoration:none;flex-shrink:0}
    .logo span{color:var(--blue)}
    .nav-center{display:flex;align-items:center;gap:20px}
    .nav-link{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .15s;white-space:nowrap}
    .nav-link:hover,.nav-link.active{color:var(--text)}
    .nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .lang-bar{display:flex;gap:2px;margin-right:8px}
    .lang-btn{background:none;border:1px solid transparent;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--muted);padding:4px 8px;cursor:pointer;transition:all .15s}
    .lang-btn:hover{color:var(--text);border-color:var(--border)}
    .lang-btn.active{color:var(--text);border-color:var(--accent);background:var(--tag-bg)}
    .btn-ghost{background:none;border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--text);padding:6px 14px;cursor:pointer;transition:background .15s}
    .btn-ghost:hover{background:var(--hover)}
    .btn-solid{background:var(--accent);border:none;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#fff;padding:6px 14px;cursor:pointer;transition:opacity .15s}
    .btn-solid:hover{opacity:.82}

    /* HERO */
    .hero{padding:52px 32px 36px;text-align:center;border-bottom:1px solid var(--border)}
    .hero-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
    .hero h1{font-size:34px;font-weight:600;line-height:1.2;margin-bottom:8px}
    .zh .hero h1,.zh-h1{font-family:'Noto Serif SC',serif}
    .kr .hero h1,.kr-h1{font-family:'Noto Serif KR',serif}
    .en .hero h1,.en-h1{font-family:'Playfair Display',serif}
    .hero-sub{font-size:12px;color:var(--muted);margin-bottom:28px}
    .search-bar{display:flex;align-items:center;max-width:540px;margin:0 auto;border:1px solid var(--border);border-bottom:2px solid var(--accent)}
    .search-bar input{flex:1;border:none;outline:none;font-family:'DM Mono',monospace;font-size:13px;padding:13px 16px;background:transparent;color:var(--text)}
    .search-bar input::placeholder{color:#ccc}
    .search-bar button{background:var(--accent);border:none;color:#fff;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;padding:13px 18px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
    .search-bar button:hover{opacity:.82}
    .search-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:14px}
    .search-tag{font-size:10px;letter-spacing:0.08em;color:var(--muted);border:1px solid var(--border);padding:4px 12px;cursor:pointer;transition:all .15s;text-decoration:none}
    .search-tag:hover{color:var(--text);border-color:var(--text)}

    /* LAYOUT */
    .main{display:flex;max-width:1180px;margin:0 auto;padding:36px 32px;gap:32px}
    .content{flex:1;min-width:0}
    .sidebar{width:272px;flex-shrink:0}

    /* SECTION */
    .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .sec-title{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text)}
    .sec-more{font-size:10px;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:1px;transition:color .15s}
    .sec-more:hover{color:var(--text)}

    /* CATEGORY GRID */
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:44px}
    .cat-card{border:1px solid var(--border);padding:18px 14px;cursor:pointer;transition:border-color .15s,background .15s;text-decoration:none;display:block}
    .cat-card:hover{border-color:var(--accent);background:var(--hover)}
    .cat-icon{font-size:20px;margin-bottom:8px}
    .cat-name{font-size:12px;letter-spacing:0.06em;color:var(--text);margin-bottom:3px}
    .cat-desc{font-size:10px;color:var(--muted);line-height:1.5}
    .cat-count{font-size:10px;color:var(--muted);margin-top:8px;border-top:1px solid var(--border);padding-top:7px}

    /* TABS */
    .tabs{display:flex;margin-bottom:20px;border-bottom:1px solid var(--border)}
    .tab{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;padding:9px 18px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
    .tab.active{color:var(--text);border-bottom-color:var(--accent)}
    .tab:hover{color:var(--text)}

    /* POST LIST */
    .post-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
    .post-card{background:var(--bg);padding:18px 0;display:flex;gap:14px;cursor:pointer;transition:all .12s}
    .post-card:hover{background:var(--hover);padding-left:6px}
    .post-left{flex:1;min-width:0}
    .post-meta{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
    .post-cat{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:2px 7px;border:1px solid currentColor}
    .cat-blue{color:var(--blue)}.cat-green{color:var(--green)}.cat-orange{color:var(--orange)}
    .cat-purple{color:var(--purple)}.cat-pink{color:var(--pink)}.cat-teal{color:var(--teal)}
    .post-author{font-size:10px;color:var(--muted)}
    .post-time{font-size:10px;color:#ccc}
    .post-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:5px;color:var(--text)}
    .post-excerpt{font-size:11px;color:var(--muted);line-height:1.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .post-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
    .post-tag{font-size:9px;color:var(--muted);background:var(--tag-bg);padding:2px 7px;letter-spacing:0.04em}
    .post-footer{display:flex;align-items:center;gap:14px;margin-top:8px}
    .post-stat{font-size:10px;color:#bbb}
    .post-right{width:76px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:flex-end}
    .post-score{text-align:center}
    .score-num{font-size:22px;font-weight:300;color:var(--text);line-height:1}
    .score-stars{color:#f5a623;font-size:10px;margin-top:2px}
    .score-label{font-size:9px;color:var(--muted);letter-spacing:0.08em;margin-top:2px}

    /* SIDEBAR */
    .sidebar-section{margin-bottom:32px}
    .sidebar-title{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--border)}
    .user-list{display:flex;flex-direction:column}
    .user-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
    .user-item:last-child{border-bottom:none}
    .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
    .user-info{flex:1;min-width:0}
    .user-name{font-size:12px;color:var(--text);margin-bottom:2px}
    .user-tag{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .follow-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.08em;border:1px solid var(--border);background:none;padding:4px 9px;cursor:pointer;color:var(--text);transition:all .15s;white-space:nowrap}
    .follow-btn:hover,.follow-btn.following{background:var(--accent);color:#fff;border-color:var(--accent)}
    .tag-cloud{display:flex;flex-wrap:wrap;gap:7px}
    .cloud-tag{font-size:10px;color:var(--muted);border:1px solid var(--border);padding:4px 11px;cursor:pointer;transition:all .15s;text-decoration:none}
    .cloud-tag:hover{color:var(--text);border-color:var(--text)}
    .notice-list{border:1px solid var(--border)}
    .notice-item{padding:11px 13px;border-bottom:1px solid var(--border);font-size:11px;line-height:1.5;color:var(--muted);cursor:pointer;transition:background .12s}
    .notice-item:last-child{border-bottom:none}
    .notice-item:hover{background:var(--hover);color:var(--text)}
    .notice-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--blue);margin-right:7px;vertical-align:middle}

    /* FOOTER */
    footer{border-top:1px solid var(--border);padding:22px 32px;display:flex;justify-content:space-between;align-items:center;margin-top:32px}
    .footer-logo{font-family:'Playfair Display',serif;font-size:16px;color:var(--text)}
    .footer-logo span{color:var(--blue)}
    .footer-links{display:flex;gap:18px}
    .footer-link{font-size:10px;letter-spacing:0.08em;color:var(--muted);text-decoration:none}
    .footer-link:hover{color:var(--text)}
    .footer-copy{font-size:10px;color:#ccc}

    @media(max-width:900px){.sidebar{display:none}.cat-grid{grid-template-columns:repeat(2,1fr)}nav .nav-center{display:none}}
    @media(max-width:600px){.hero{padding:36px 16px 24px}.hero h1{font-size:24px}.main{padding:20px 16px}nav{padding:0 14px}.cat-grid{grid-template-columns:repeat(2,1fr);gap:8px}}
  </style>
</head>

let lang = 'kr';

function setLang(l, btn) {
  lang = l;
  document.body.className = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyText();
  renderAll();
}

function applyText() {
  const t = T[lang];
  document.querySelectorAll('[data-i]').forEach(el => {
    const key = el.getAttribute('data-i');
    if (t[key]) el.textContent = t[key];
  });
  document.querySelectorAll('[data-i-ph]').forEach(el => {
    const key = el.getAttribute('data-i-ph');
    if (t[key]) el.placeholder = t[key];
  });
}

function renderAll() {
  const t = T[lang];
  renderSearchTags();
  renderCats();
  renderTabs();
  renderPosts('all');
  renderUsers();
  renderTags();
  renderNotices();
}

function renderSearchTags() {
  const t = T[lang];
  const tags = {
    zh:['北京/首尔','托福备考','食堂评价','考研经验','韩国留学','学习方法','宿舍生活'],
    kr:['서울대','수능준비','학식평가','편입정보','한국유학','공부법','기숙사생활'],
    en:['SNU / Yonsei','TOPIK Prep','Cafeteria Reviews','Transfer Info','Study in Korea','Study Methods','Dorm Life']
  };
  document.getElementById('searchTags').innerHTML = tags[lang].map(t=>`<a class="search-tag" href="#">${t}</a>`).join('');
}

function renderCats() {
  const t = T[lang];
  document.getElementById('catGrid').innerHTML = t.cats.map(c=>`
    <a class="cat-card" href="#">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-name">${c.name}</div>
      <div class="cat-desc">${c.desc}</div>
      <div class="cat-count">${c.count}</div>
    </a>`).join('');
}

function renderTabs(active='all') {
  const t = T[lang];
  const tabs = [
    {id:'all',label:t.tab_all},
    {id:'review',label:t.tab_review},
    {id:'study',label:t.tab_study},
    {id:'admission',label:t.tab_admission},
    {id:'abroad',label:t.tab_abroad},
  ];
  document.getElementById('tabBar').innerHTML = tabs.map(tab=>`
    <div class="tab${tab.id===active?' active':''}" onclick="switchTab(this,'${tab.id}')">${tab.label}</div>
  `).join('');
}

function renderPosts(filter='all') {
  const t = T[lang];
  const posts = filter==='all' ? t.posts : t.posts.filter(p=>p.cat===filter);
  document.getElementById('postList').innerHTML = posts.map(p=>`
    <div class="post-card">
      <div class="post-left">
        <div class="post-meta">
          <span class="post-cat ${p.catColor}">${p.catLabel}</span>
          <span class="post-author">${p.author}</span>
          <span class="post-time">${p.time}</span>
        </div>
        <div class="post-title">${p.title}</div>
        <div class="post-excerpt">${p.excerpt}</div>
        <div class="post-tags">${p.tags.map(tg=>`<span class="post-tag">${tg}</span>`).join('')}</div>
        <div class="post-footer"><span class="post-stat">${p.stats}</span></div>
      </div>
      <div class="post-right">${p.score?`<div class="post-score"><div class="score-num">${p.score}</div><div class="score-stars">${p.stars}</div><div class="score-label">${p.scoreLabel}</div></div>`:''}</div>
    </div>`).join('');
}

function switchTab(el, cat) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderPosts(cat);
}

function renderUsers() {
  const t = T[lang];
  document.getElementById('userList').innerHTML = t.users.map((u,i)=>`
    <div class="user-item">
      <div class="avatar" style="background:${u.bg}">${u.initials}</div>
      <div class="user-info">
        <div class="user-name">${u.name}</div>
        <div class="user-tag">${u.tag}</div>
      </div>
      <button class="follow-btn${i===3?' following':''}" onclick="toggleFollow(this)">
        ${i===3?t.following:t.follow}
      </button>
    </div>`).join('');
}

function renderTags() {
  document.getElementById('tagCloud').innerHTML = T[lang].tags.map(tg=>`<a class="cloud-tag" href="#">${tg}</a>`).join('');
}

function renderNotices() {
  document.getElementById('noticeList').innerHTML = T[lang].notices.map(n=>`
    <div class="notice-item"><span class="notice-dot"></span>${n}</div>`).join('');
}

function toggleFollow(btn) {
  const t = T[lang];
  if (btn.classList.contains('following')) {
    btn.classList.remove('following'); btn.textContent = t.follow;
  } else {
    btn.classList.add('following'); btn.textContent = t.following;
  }
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (q) alert({zh:'搜索：',kr:'검색：',en:'Search: '}[lang] + q);
}

document.addEventListener('DOMContentLoaded', () => {
  // default kr
  document.querySelectorAll('.lang-btn')[1].classList.add('active');
  applyText();
  renderAll();
});

document.addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
</script>
