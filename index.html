<!DOCTYPE html>
<html lang="kr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyLink — 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Serif+KR:wght@400;600&family=DM+Mono:wght@300;400&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fff;--border:#e8e8e8;--text:#1a1a1a;--muted:#999;--accent:#1a1a1a;--error:#d0453a;--success:#2d7a4f}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column}
    nav{border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:52px}
    .logo{font-family:'Playfair Display',serif;font-size:18px;text-decoration:none;color:var(--text)}
    .logo span{color:#3b6ef5}
    .lang-bar{display:flex;gap:2px}
    .lang-btn{background:none;border:1px solid transparent;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:4px 8px;cursor:pointer;transition:all .15s}
    .lang-btn.active{color:var(--text);border-color:var(--text);background:#f4f4f4}
    .lang-btn:hover{color:var(--text)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:100%;max-width:420px}
    .card-top{margin-bottom:36px}
    .card-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
    h1{font-size:30px;font-weight:600;line-height:1.2;margin-bottom:6px}
    .zh h1{font-family:'Noto Serif SC',serif}
    .kr h1{font-family:'Noto Serif KR',serif}
    .en h1{font-family:'Playfair Display',serif}
    .card-sub{font-size:12px;color:var(--muted)}
    .field{margin-bottom:20px}
    .field label{display:block;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
    .field input{width:100%;border:none;border-bottom:2px solid var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:14px;padding:10px 0;outline:none;color:var(--text);transition:border-color .2s}
    .field input:focus{border-bottom-color:var(--accent)}
    .field input::placeholder{color:#ccc}
    .options{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;font-size:11px}
    .remember{display:flex;align-items:center;gap:7px;color:var(--muted);cursor:pointer;user-select:none}
    .remember input[type=checkbox]{appearance:none;-webkit-appearance:none;width:13px;height:13px;border:1px solid var(--border);background:transparent;cursor:pointer;position:relative;flex-shrink:0;transition:all .15s}
    .remember input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
    .remember input[type=checkbox]:checked::after{content:'';position:absolute;top:2px;left:4px;width:3px;height:6px;border-right:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(45deg)}
    .forgot{color:var(--muted);text-decoration:none;font-size:11px;transition:color .15s}
    .forgot:hover{color:var(--text)}
    .btn{width:100%;padding:14px;background:var(--accent);color:#fff;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;border:none;cursor:pointer;transition:opacity .2s}
    .btn:hover{opacity:.82}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:var(--muted);font-size:10px;letter-spacing:0.1em}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .register-line{text-align:center;font-size:12px;color:var(--muted)}
    .register-line a{color:var(--text);text-decoration:underline;text-underline-offset:3px;cursor:pointer}
    .msg{font-size:11px;padding:10px 14px;margin-bottom:18px;display:none}
    .msg.err{background:#fff0f0;border-left:3px solid var(--error);color:var(--error);display:block}
    .msg.ok{background:#f0fff6;border-left:3px solid var(--success);color:var(--success);display:block}
    footer{border-top:1px solid var(--border);padding:16px 32px;text-align:center;font-size:10px;color:#ccc}
    @media(max-width:480px){.card{padding:0 4px}nav{padding:0 16px}}
  </style>
</head>
<body class="kr">
<nav>
  <a class="logo" href="#">Study<span>Link</span></a>
  <div class="lang-bar">
    <button class="lang-btn" onclick="setLang('zh',this)">中文</button>
    <button class="lang-btn active" onclick="setLang('kr',this)">한국어</button>
    <button class="lang-btn" onclick="setLang('en',this)">EN</button>
  </div>
</nav>
<main>
  <div class="card">
    <div class="card-top">
      <div class="card-label" id="t-label">시스템 입구</div>
      <h1 id="t-title">다시 오신 것을<br>환영합니다</h1>
      <p class="card-sub" id="t-sub">계속하려면 계정 정보를 입력하세요</p>
    </div>
    <div class="msg" id="msg"></div>
    <div class="field">
      <label id="t-email">이메일</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label id="t-pass">비밀번호</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div class="options">
      <label class="remember"><input type="checkbox" id="remember"/><span id="t-remember">로그인 유지</span></label>
      <a href="#" class="forgot" id="t-forgot">비밀번호 찾기</a>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()"><span id="t-loginbtn">로그인</span></button>
    <div class="divider"><span id="t-or">또는</span></div>
    <div class="register-line"><span id="t-noreg">계정이 없으신가요?</span> <a onclick="goto('register.html')" id="t-toreg">회원가입</a></div>
  </div>
</main>
<footer>© 2026 StudyLink</footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://scjogvlntaxruzqmynzo.supabase.co';
const SUPA_KEY = 'sb_publishable_OhcblProSDX0onhai44U6g_R6g3Ekhd';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const T = {
  zh:{label:'系统入口',title:'欢迎回来',sub:'请输入账户信息以继续',email:'邮箱',pass:'密码',remember:'记住我',forgot:'忘记密码？',loginbtn:'登 录',or:'或者',noreg:'还没有账户？',toreg:'立即注册',loading:'验证中...',errEmpty:'请填写所有字段',errFail:'邮箱或密码错误',ok:'登录成功，跳转中...'},
  kr:{label:'시스템 입구',title:'다시 오신 것을\n환영합니다',sub:'계속하려면 계정 정보를 입력하세요',email:'이메일',pass:'비밀번호',remember:'로그인 유지',forgot:'비밀번호 찾기',loginbtn:'로그인',or:'또는',noreg:'계정이 없으신가요?',toreg:'회원가입',loading:'확인 중...',errEmpty:'모든 항목을 입력해주세요',errFail:'이메일 또는 비밀번호가 올바르지 않습니다',ok:'로그인 성공! 이동 중...'},
  en:{label:'Portal',title:'Welcome\nBack',sub:'Enter your credentials to continue',email:'Email',pass:'Password',remember:'Remember me',forgot:'Forgot password?',loginbtn:'Sign In',or:'or',noreg:"Don't have an account?",toreg:'Sign up',loading:'Verifying...',errEmpty:'Please fill in all fields',errFail:'Incorrect email or password',ok:'Login successful! Redirecting...'}
};
let lang='kr';
function setLang(l,btn){
  lang=l; document.body.className=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const t=T[l];
  document.getElementById('t-label').textContent=t.label;
  document.getElementById('t-title').innerHTML=t.title.replace('\n','<br>');
  document.getElementById('t-sub').textContent=t.sub;
  document.getElementById('t-email').textContent=t.email;
  document.getElementById('t-pass').textContent=t.pass;
  document.getElementById('t-remember').textContent=t.remember;
  document.getElementById('t-forgot').textContent=t.forgot;
  document.getElementById('t-loginbtn').textContent=t.loginbtn;
  document.getElementById('t-or').textContent=t.or;
  document.getElementById('t-noreg').textContent=t.noreg;
  document.getElementById('t-toreg').textContent=t.toreg;
}
function showMsg(txt,type){const m=document.getElementById('msg');m.textContent=txt;m.className='msg '+type}
function goto(p){window.location.href=p}
async function doLogin(){
  const t=T[lang];
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  if(!email||!pass){showMsg(t.errEmpty,'err');return}
  const btn=document.getElementById('loginBtn');
  const btnTxt=document.getElementById('t-loginbtn');
  btn.disabled=true; btnTxt.textContent=t.loading;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.disabled=false; btnTxt.textContent=t.loginbtn;
  if(error){showMsg(t.errFail,'err')}
  else{showMsg(t.ok,'ok');setTimeout(()=>goto('home.html'),1200)}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
